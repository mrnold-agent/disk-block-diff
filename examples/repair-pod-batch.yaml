# Batched repair when repair.jsonl exceeds ~1 MiB (ConfigMap limit) or you want
# smaller apply units per maintenance window.
#
# Split on the workstation (keeps JSONL lines intact):
#   split -l 4000 -d --additional-suffix=.jsonl repair.jsonl repair-batch-
#   ls -lh repair-batch-*
#
# Workflow:
#   1. kubectl apply -f examples/repair-pod-batch.yaml
#   2. kubectl wait --for=condition=Ready pod/disk-block-diff-repair-batch -n default
#   3. kubectl cp repair-batch-00.jsonl default/disk-block-diff-repair-batch:/var/tmp/
#   kubectl cp repair-batch-01.jsonl default/disk-block-diff-repair-batch:/var/tmp/
#      ... or: for f in repair-batch-*.jsonl; do kubectl cp "$f" ...:/var/tmp/; done
#   4. kubectl exec -n default disk-block-diff-repair-batch -- touch /var/tmp/repair-batches.ready
#   5. kubectl logs -f disk-block-diff-repair-batch
#
# One nbd-open session; apply runs each batch in sorted order.
apiVersion: v1
kind: Pod
metadata:
  name: disk-block-diff-repair-batch
  namespace: default
  labels:
    app: disk-block-diff
spec:
  restartPolicy: Never
  containers:
    - name: repair
      image: REPLACE_WITH_IMAGE
      command:
        - /bin/bash
        - -ec
        - |
          set -o pipefail
          BIN=disk-block-diff
          STATE=/var/run/disk-block-diff/nbd.state
          READY=/var/tmp/repair-batches.ready
          WAIT_SECONDS="${REPAIR_WAIT_SECONDS:-3600}"

          echo "waiting up to ${WAIT_SECONDS}s for batch files + ${READY}"
          deadline=$((SECONDS + WAIT_SECONDS))
          while [[ ! -f "${READY}" ]]; do
            if (( SECONDS >= deadline )); then
              echo "timed out waiting for ${READY}" >&2
              exit 1
            fi
            sleep 5
          done

          mapfile -t batches < <(ls -1 /var/tmp/repair-batch-*.jsonl 2>/dev/null | sort -V)
          if [[ ${#batches[@]} -eq 0 ]]; then
            echo "no /var/tmp/repair-batch-*.jsonl files found" >&2
            exit 1
          fi
          echo "found ${#batches[@]} repair batch(es)"
          total_bytes=0
          total_lines=0
          for batch in "${batches[@]}"; do
            lines=$(wc -l < "${batch}")
            bytes=$(wc -c < "${batch}")
            total_lines=$((total_lines + lines))
            total_bytes=$((total_bytes + bytes))
            echo "  ${batch}: ${lines} lines, ${bytes} bytes"
          done
          echo "total: ${total_lines} lines, ${total_bytes} bytes"

          "${BIN}" nbd-open \
            -server "${VDDK_ENDPOINT}" \
            -username "${VDDK_USER}" \
            -password "${VDDK_PASSWORD}" \
            -thumbprint "${VDDK_THUMBPRINT}" \
            -uuid "${VDDK_UUID}" \
            -backing-file "${VDDK_BACKING_FILE}" \
            -snapshot "${VDDK_SNAPSHOT}" \
            -state-file "${STATE}"

          for batch in "${batches[@]}"; do
            echo "=== apply ${batch} ==="
            "${BIN}" apply \
              -nbd-state "${STATE}" \
              -dest /dev/cdi-block-volume \
              -blocks "${batch}" \
              -workers "${APPLY_WORKERS}" \
              -progress-interval "${PROGRESS_INTERVAL}"
          done

          "${BIN}" nbd-close -state-file "${STATE}"
      env:
        - name: REPAIR_WAIT_SECONDS
          value: "3600"
        - name: APPLY_WORKERS
          value: "4"
        - name: PROGRESS_INTERVAL
          value: "30s"
        - name: VDDK_ENDPOINT
          value: REPLACE_VCENTER_HOST
        - name: VDDK_USER
          valueFrom:
            secretKeyRef:
              name: disk-block-diff-vddk
              key: user
        - name: VDDK_PASSWORD
          valueFrom:
            secretKeyRef:
              name: disk-block-diff-vddk
              key: password
        - name: VDDK_THUMBPRINT
          value: REPLACE_VCENTER_THUMBPRINT
        - name: VDDK_UUID
          value: REPLACE_VM_UUID
        - name: VDDK_BACKING_FILE
          value: REPLACE_BACKING_FILE
        - name: VDDK_SNAPSHOT
          value: REPLACE_SNAPSHOT_NAME_OR_MOREF
      securityContext:
        privileged: true
      volumeDevices:
        - name: target
          devicePath: /dev/cdi-block-volume
      volumeMounts:
        - name: scratch
          mountPath: /var/tmp
        - name: run
          mountPath: /var/run/disk-block-diff
        - name: vddk-config
          mountPath: /etc/vddk-config
          readOnly: true
  volumes:
    - name: target
      persistentVolumeClaim:
        claimName: REPLACE_WITH_PVC_NAME
    - name: scratch
      emptyDir:
        sizeLimit: 512Mi
    - name: run
      emptyDir: {}
    - name: vddk-config
      configMap:
        name: REPLACE_VDDK_CONFIGMAP
        optional: true
