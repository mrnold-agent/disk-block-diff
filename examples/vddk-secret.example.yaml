# vCenter credentials for disk-block-diff nbd-open (keys: user, password).
#
# Quick create without editing this file:
#   kubectl create secret generic disk-block-diff-vddk \
#     --namespace default \
#     --from-literal=user='VCENTER_USER' \
#     --from-literal=password='VCENTER_PASSWORD'
#
# Or copy, fill in stringData, and apply:
#   cp examples/vddk-secret.example.yaml /tmp/vddk-secret.yaml
#   # edit /tmp/vddk-secret.yaml — do not commit real credentials
#   kubectl apply -f /tmp/vddk-secret.yaml
#
# Use the same name in examples/repair-pod.yaml (disk-block-diff-vddk).
apiVersion: v1
kind: Secret
metadata:
  name: disk-block-diff-vddk
  namespace: default
  labels:
    app: disk-block-diff
type: Opaque
stringData:
  user: REPLACE_VCENTER_USER
  password: REPLACE_VCENTER_PASSWORD
