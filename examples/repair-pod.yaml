# Production repair pod: nbd-open + apply repair.jsonl onto a block PVC.
#
# repair.jsonl is NOT mounted from a ConfigMap — Kubernetes ConfigMaps are limited to
# ~1 MiB. At 1 GiB block size that is only ~5 TiB of unique mismatched chunks.
# Use emptyDir + kubectl cp (or a scratch PVC) for production repair lists.
#
# Prerequisites:
#   - Image: CDI importer + VDDK + disk-block-diff (see e2e/build-image.sh)
#   - Secret: examples/vddk-secret.example.yaml
#   - repair.jsonl on your workstation (from: diff -a source.jsonl -b dest.jsonl)
#
# Workflow:
#   1. kubectl apply -f examples/repair-pod.yaml   # patch placeholders first
#   2. kubectl wait --for=condition=Ready pod/disk-block-diff-repair -n default --timeout=120s
#   3. kubectl cp repair.jsonl default/disk-block-diff-repair:/var/tmp/repair.jsonl
#   4. kubectl exec -n default disk-block-diff-repair -- touch /var/tmp/repair.jsonl.ready
#   5. kubectl logs -f disk-block-diff-repair
#
# Check size before apply (stay under ~900 KiB if you insist on ConfigMap; this pod has no such limit):
#   wc -c repair.jsonl
#   wc -l repair.jsonl
#
# For repair.jsonl > ~1 MiB or many batches, use examples/repair-pod-batch.yaml instead.
apiVersion: v1
kind: Pod
metadata:
  name: disk-block-diff-repair
  namespace: default
  labels:
    app: disk-block-diff
spec:
  restartPolicy: Never
  containers:
    - name: repair
      image: REPLACE_WITH_IMAGE
      command:
        - /bin/bash
        - -ec
        - |
          set -o pipefail
          BIN=disk-block-diff
          STATE=/var/run/disk-block-diff/nbd.state
          REPAIR=/var/tmp/repair.jsonl
          READY=/var/tmp/repair.jsonl.ready
          WAIT_SECONDS="${REPAIR_WAIT_SECONDS:-3600}"

          echo "waiting up to ${WAIT_SECONDS}s for ${REPAIR} (kubectl cp then: touch ${READY})"
          deadline=$((SECONDS + WAIT_SECONDS))
          while [[ ! -f "${READY}" ]]; do
            if (( SECONDS >= deadline )); then
              echo "timed out waiting for ${READY}" >&2
              exit 1
            fi
            sleep 5
          done
          if [[ ! -s "${REPAIR}" ]]; then
            echo "repair manifest missing or empty: ${REPAIR}" >&2
            exit 1
          fi
          echo "repair manifest: $(wc -l < "${REPAIR}") lines, $(wc -c < "${REPAIR}") bytes"

          "${BIN}" nbd-open \
            -server "${VDDK_ENDPOINT}" \
            -username "${VDDK_USER}" \
            -password "${VDDK_PASSWORD}" \
            -thumbprint "${VDDK_THUMBPRINT}" \
            -uuid "${VDDK_UUID}" \
            -backing-file "${VDDK_BACKING_FILE}" \
            -snapshot "${VDDK_SNAPSHOT}" \
            -state-file "${STATE}"

          "${BIN}" apply \
            -nbd-state "${STATE}" \
            -dest /dev/cdi-block-volume \
            -blocks "${REPAIR}" \
            -workers "${APPLY_WORKERS}" \
            -progress-interval "${PROGRESS_INTERVAL}"

          "${BIN}" nbd-close -state-file "${STATE}"
      env:
        - name: REPAIR_WAIT_SECONDS
          value: "3600"
        - name: APPLY_WORKERS
          value: "4"
        - name: PROGRESS_INTERVAL
          value: "30s"
        - name: VDDK_ENDPOINT
          value: REPLACE_VCENTER_HOST
        - name: VDDK_USER
          valueFrom:
            secretKeyRef:
              name: disk-block-diff-vddk
              key: user
        - name: VDDK_PASSWORD
          valueFrom:
            secretKeyRef:
              name: disk-block-diff-vddk
              key: password
        - name: VDDK_THUMBPRINT
          value: REPLACE_VCENTER_THUMBPRINT
        - name: VDDK_UUID
          value: REPLACE_VM_UUID
        - name: VDDK_BACKING_FILE
          value: REPLACE_BACKING_FILE
        - name: VDDK_SNAPSHOT
          value: REPLACE_SNAPSHOT_NAME_OR_MOREF
      securityContext:
        privileged: true
      volumeDevices:
        - name: target
          devicePath: /dev/cdi-block-volume
      volumeMounts:
        - name: scratch
          mountPath: /var/tmp
        - name: run
          mountPath: /var/run/disk-block-diff
        - name: vddk-config
          mountPath: /etc/vddk-config
          readOnly: true
  volumes:
    - name: target
      persistentVolumeClaim:
        claimName: REPLACE_WITH_PVC_NAME
    - name: scratch
      emptyDir:
        # repair.jsonl is ~200 bytes per mismatched 1 GiB block (~600 KiB per 3 TiB dirty).
        sizeLimit: 128Mi
    - name: run
      emptyDir: {}
    - name: vddk-config
      configMap:
        name: REPLACE_VDDK_CONFIGMAP
        optional: true
