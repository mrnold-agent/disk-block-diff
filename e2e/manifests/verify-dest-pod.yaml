apiVersion: v1
kind: Pod
metadata:
  name: ${E2E_POD_NAME}
  namespace: ${E2E_NAMESPACE}
  labels:
    app: disk-block-diff-e2e
    phase: verify-dest
spec:
  restartPolicy: Never
  containers:
    - name: verify
      image: ${E2E_IMAGE}
      command:
        - /bin/bash
        - -ec
        - |
          set -o pipefail
          BIN="${E2E_POD_BINARY}"
          OUT="/var/tmp/dest-after.jsonl"
          PART="${OUT}.part"
          "${BIN}" hash \
            -device "${E2E_DEST_DEVICE}" \
            -output "${PART}" \
            -block-size "${E2E_BLOCK_SIZE}" \
            -workers "${E2E_HASH_WORKERS}" \
            -progress-interval "${E2E_PROGRESS_INTERVAL}"
          mv -f "${PART}" "${OUT}"
          ls -lh "${OUT}"
          echo "E2E_ARTIFACT_READY ${OUT}"
          touch "${OUT}.ready"
          sleep "${E2E_ARTIFACT_HOLD_SECONDS:-120}"
      env:
        - name: E2E_ARTIFACT_HOLD_SECONDS
          value: "${E2E_ARTIFACT_HOLD_SECONDS}"
        - name: E2E_BLOCK_SIZE
          value: "${E2E_BLOCK_SIZE}"
        - name: E2E_HASH_WORKERS
          value: "${E2E_HASH_WORKERS}"
        - name: E2E_PROGRESS_INTERVAL
          value: "${E2E_PROGRESS_INTERVAL}"
        - name: E2E_DEST_DEVICE
          value: "${E2E_DEST_DEVICE}"
        - name: E2E_POD_BINARY
          value: "${E2E_POD_BINARY}"
      securityContext:
        privileged: true
      volumeDevices:
        - name: target
          devicePath: ${E2E_DEST_DEVICE}
      volumeMounts:
        - name: scratch
          mountPath: /var/tmp
  volumes:
    - name: target
      persistentVolumeClaim:
        claimName: ${E2E_PVC_NAME}
    - name: scratch
      emptyDir:
        sizeLimit: 4Gi
